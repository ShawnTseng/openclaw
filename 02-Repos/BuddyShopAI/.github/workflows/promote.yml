name: Promote Staging → Production

on:
  workflow_dispatch:
    inputs:
      customer:
        description: '目標客戶'
        required: true
        default: 'mrvshop'
        type: choice
        options: [mrvshop, guban]

env:
  DOTNET_VERSION: '8.0.x'
  CUSTOMER: ${{ github.event.inputs.customer || 'mrvshop' }}

jobs:
  verify-staging:
    name: Verify Staging
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Health check staging
        run: |
          URL="https://${{ env.CUSTOMER }}-func-staging.azurewebsites.net/api/health"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
          echo "Staging → HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "❌ Staging is not healthy"; exit 1; }

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: verify-staging
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet publish BuddyShopAI.csproj --configuration Release --output ./publish
      - name: Verify publish output
        run: |
          ls -la ./publish/.azurefunctions/ || { echo "::error::.azurefunctions folder missing!"; exit 1; }
          test -f ./publish/functions.metadata || { echo "::error::functions.metadata missing!"; exit 1; }
          echo "✅ Publish output looks good"
      - uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ./publish
          include-hidden-files: true

  promote:
    name: 'Promote → Production / ${{ github.event.inputs.customer || ''mrvshop'' }}'
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./publish

      - name: Verify artifact includes .azurefunctions
        run: ls -la ./publish/.azurefunctions/ || { echo "::error::.azurefunctions missing from artifact!"; exit 1; }

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.CUSTOMER }}-func
          package: ./publish

      - name: Health check
        run: |
          APP="${{ env.CUSTOMER }}-func"
          URL="https://${APP}.azurewebsites.net/api/health"
          echo "Waiting 30s for cold start..."
          sleep 30
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
            echo "Attempt $i/12 → HTTP $HTTP_CODE"
            [ "$HTTP_CODE" = "200" ] && exit 0
            [ "$i" -lt 12 ] && sleep 15
          done
          echo "::error::Health check failed after 12 attempts"
          exit 1
