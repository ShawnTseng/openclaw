name: Keep Warm (Staging)

on:
  schedule:
    - cron: '*/4 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping
    runs-on: ubuntu-latest
    timeout-minutes: 2
    strategy:
      matrix:
        app: [mrvshop-func-staging]
    steps:
      - name: Health check
        run: |
          URL="https://${{ matrix.app }}.azurewebsites.net/api/health"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
          echo "${{ matrix.app }} → HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || exit 1
