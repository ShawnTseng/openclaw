name: Deploy to Azure Functions

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署環境'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      customer:
        description: '目標客戶'
        required: true
        default: 'mrvshop'
        type: choice
        options: [mrvshop, guban]

env:
  DOTNET_VERSION: '8.0.x'
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
  CUSTOMER: ${{ github.event.inputs.customer || 'mrvshop' }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet publish BuddyShopAI.csproj --configuration Release --output ./publish
      - name: Verify publish output
        run: |
          echo "=== Checking .azurefunctions folder ==="
          ls -la ./publish/.azurefunctions/ || { echo "::error::.azurefunctions folder missing!"; exit 1; }
          echo "=== Checking key files ==="
          test -f ./publish/functions.metadata || { echo "::error::functions.metadata missing!"; exit 1; }
          test -f ./publish/host.json || { echo "::error::host.json missing!"; exit 1; }
          echo "✅ Publish output looks good"
      - uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ./publish
          include-hidden-files: true

  deploy-staging:
    name: 'Deploy → Staging / ${{ github.event.inputs.customer || ''mrvshop'' }}'
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || github.event.inputs.environment == 'staging' }}
    timeout-minutes: 15
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./publish

      - name: Verify artifact includes .azurefunctions
        run: ls -la ./publish/.azurefunctions/ || { echo "::error::.azurefunctions missing from artifact!"; exit 1; }

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy
        run: |
          APP="${{ env.CUSTOMER }}-func-staging"
          RG="rg-${{ env.CUSTOMER }}-staging"

          # 1. Clear settings that conflict with zipdeploy
          az functionapp config appsettings delete \
            --name "$APP" --resource-group "$RG" \
            --setting-names WEBSITE_RUN_FROM_PACKAGE --output none 2>/dev/null || true

          # 2. Package & deploy via Kudu zipdeploy (most reliable for Linux Consumption)
          cd ./publish && zip -r /tmp/deploy.zip . && cd -
          az functionapp deployment source config-zip \
            --name "$APP" --resource-group "$RG" \
            --src /tmp/deploy.zip --timeout 300

          # 3. Force restart to ensure the new worker is loaded
          az functionapp restart --name "$APP" --resource-group "$RG"

      - name: Verify functions discovered
        run: |
          APP="${{ env.CUSTOMER }}-func-staging"
          RG="rg-${{ env.CUSTOMER }}-staging"
          echo "Waiting 60s for function host to discover functions..."
          sleep 60
          FUNCS=$(az functionapp function list --name "$APP" --resource-group "$RG" --query "[].name" -o tsv 2>/dev/null || echo "")
          echo "Discovered functions: $FUNCS"
          if [ -z "$FUNCS" ]; then
            echo "::warning::No functions discovered yet – will retry during health check"
          fi

      - name: Health check
        run: |
          APP="${{ env.CUSTOMER }}-func-staging"
          URL="https://${APP}.azurewebsites.net/api/health"
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
            echo "Attempt $i/12 → HTTP $HTTP_CODE"
            [ "$HTTP_CODE" = "200" ] && exit 0
            [ "$i" -lt 12 ] && sleep 15
          done
          echo "::error::Health check failed after 12 attempts"
          exit 1

  deploy-production:
    name: 'Deploy → Production / ${{ github.event.inputs.customer || ''mrvshop'' }}'
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.environment == 'production' }}
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./publish

      - name: Verify artifact includes .azurefunctions
        run: ls -la ./publish/.azurefunctions/ || { echo "::error::.azurefunctions missing from artifact!"; exit 1; }

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.CUSTOMER }}-func
          package: ./publish

      - name: Health check
        run: |
          APP="${{ env.CUSTOMER }}-func"
          URL="https://${APP}.azurewebsites.net/api/health"
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
            echo "Attempt $i/12 → HTTP $HTTP_CODE"
            [ "$HTTP_CODE" = "200" ] && exit 0
            [ "$i" -lt 12 ] && sleep 15
          done
          echo "::error::Health check failed after 12 attempts"
          exit 1
